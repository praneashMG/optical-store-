<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found | OptiCare</title>
  <link rel="icon" href="assets/logo.png" type="image/jpeg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="tailwind.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6FCF97',
            accent: '#4A90E2',
            secondary: '#000000',
            darkGrey: '#111111'
          },
          fontFamily: {
            'display': ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    };  
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    [dir="rtl"] .rtl-flip { transform: scaleX(-1); }
  </style>
</head>
<body class="bg-gray-50 text-secondary dark:bg-secondary dark:text-gray-100 transition-colors duration-300 flex items-center justify-center min-h-screen relative overflow-hidden" data-dir="ltr">

  <!-- Background decorative elements -->
  <div class="absolute inset-0 opacity-10 pointer-events-none">
    <div class="absolute top-20 left-20 h-96 w-96 rounded-full bg-accent blur-3xl"></div>
    <div class="absolute bottom-20 right-20 h-96 w-96 rounded-full bg-primary blur-3xl"></div>
  </div>

  <div class="relative z-10 text-center px-4 w-full max-w-lg mx-auto">
    <!-- Logo -->
    <a href="index.html" class="inline-flex items-center justify-center gap-2 mb-10 group">
      <span class="flex h-12 w-12 items-center justify-center rounded-full bg-accent text-white shadow-lg group-hover:scale-110 transition-transform">
        <i class="fas fa-eye text-xl"></i>
      </span>
      <div class="leading-tight text-left">
        <span class="block text-2xl font-bold tracking-tight text-accent">OptiCare</span>
      </div>
    </a>
    
    <h1 class="text-9xl font-bold text-accent tracking-tighter drop-shadow-sm">404</h1>
    <h2 class="mt-6 text-3xl font-bold text-secondary dark:text-white">Page Not Found</h2>
    <p class="mt-4 text-gray-500 dark:text-gray-400">Oops! The page you're looking for seems to have vanished from our vision. Let's get you back in focus.</p>
    
    <div class="mt-10">
      <a href="index.html" class="inline-flex items-center gap-2 rounded-full bg-accent px-8 py-3.5 font-bold text-white shadow-lg transition hover:bg-accent/90 hover:-translate-y-1">
        <i class="fas fa-arrow-left rtl-flip"></i> Return Home
      </a>
    </div>
  </div>

  <!-- Theme and RTL Toggles -->
  <div class="absolute top-6 right-6 flex items-center gap-2 rtl-flip">
    <button id="rtlToggle" class="h-10 w-10 rounded-full bg-white flex items-center justify-center text-gray-600 hover:bg-gray-100 dark:bg-darkGrey dark:text-gray-300 dark:hover:bg-gray-800 transition shadow-sm border border-gray-200 dark:border-gray-800">
      <i class="fas fa-exchange-alt"></i>
    </button>
    <button id="themeToggle" class="h-10 w-10 rounded-full bg-white flex items-center justify-center text-gray-600 hover:bg-gray-100 dark:bg-darkGrey dark:text-gray-300 dark:hover:bg-gray-800 transition shadow-sm border border-gray-200 dark:border-gray-800">
      <i class="fas fa-moon dark:hidden"></i>
      <i class="fas fa-sun hidden dark:block"></i>
    </button>
  </div>
  
  <script>
    // Theme toggle logic
    const themeToggle = document.getElementById('themeToggle');
    const htmlElement = document.documentElement;
    themeToggle.addEventListener('click', () => {
      htmlElement.classList.toggle('dark');
    });

    // RTL toggle logic
    const rtlToggle = document.getElementById('rtlToggle');
    const bodyEl = document.body;
    rtlToggle.addEventListener('click', () => {
      const currentDir = bodyEl.getAttribute('dir') || 'ltr';
      bodyEl.setAttribute('dir', currentDir === 'ltr' ? 'rtl' : 'ltr');
    });
  </script>
</body>
</html>
